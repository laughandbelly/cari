<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Cari app screenshot</title>
  <desc id="desc">A screenshot-style preview of the Cari caregiver support finder showing the large video call bot and action-card reply.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf1"/>
      <stop offset=".55" stop-color="#f3fbf5"/>
      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#17231d" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <g transform="translate(72 58)">
    <circle cx="28" cy="28" r="26" fill="#fff9df" stroke="#185c37" stroke-width="4"/>
    <text x="28" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#185c37">CARI</text>
    <text x="72" y="36" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#185c37">Cari</text>
  </g>
  <g transform="translate(72 150)">
    <text font-family="Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="4" fill="#c8643c">VIDEO AND CALL CHATBOT</text>
    <text y="66" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#17231d">A bigger call room for caregiver support.</text>
    <text y="114" font-family="Arial, sans-serif" font-size="23" fill="#4f5f56">Cari replies with what you qualify for, how much you can save, and what to do next.</text>
  </g>
  <g transform="translate(72 310)" filter="url(#shadow)">
    <rect width="1296" height="510" rx="24" fill="#ffffff" stroke="#dce8de"/>
    <rect x="24" y="24" width="1248" height="462" rx="18" fill="#fff9df" stroke="#dce8de"/>
    <g transform="translate(52 52)">
      <rect width="760" height="406" rx="16" fill="#173722"/>
      <circle cx="380" cy="180" r="95" fill="#fff9df" stroke="#ffffff" stroke-width="8"/>
      <text x="380" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#185c37">CARI</text>
      <text x="380" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff">Cari</text>
      <text x="380" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d9efe1">Camera and microphone are ready</text>
      <circle cx="330" cy="374" r="28" fill="#ffffff"/>
      <circle cx="390" cy="374" r="28" fill="#ffffff"/>
      <circle cx="450" cy="374" r="28" fill="#ffffff"/>
    </g>
    <g transform="translate(846 52)">
      <rect width="398" height="406" rx="16" fill="#ffffff"/>
      <text x="22" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#17231d">Call transcript</text>
      <text x="22" y="56" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#185c37">Replies update instantly</text>
      <rect x="22" y="84" width="354" height="92" rx="12" fill="#185c37"/>
      <text x="42" y="120" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Caregiver:</text>
      <text x="42" y="148" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">My dad has dementia and needs help bathing.</text>
      <rect x="22" y="194" width="354" height="188" rx="12" fill="#dff4ff"/>
      <text x="42" y="226" font-family="Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="3" fill="#185c37">CARI ACTION PLAN</text>
      <text x="42" y="258" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#17231d">Dementia care support plan</text>
      <text x="42" y="292" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#17231d">1. What you qualify for</text>
      <text x="42" y="318" font-family="Arial, sans-serif" font-size="15" fill="#4f5f56">HCG, CareShield Life, CTG</text>
      <text x="42" y="350" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#17231d">2. How much you can save</text>
      <text x="42" y="376" font-family="Arial, sans-serif" font-size="15" fill="#4f5f56">Up to $600/mo + $400/yr training</text>
    </g>
  </g>
</svg>
