<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1500" viewBox="0 0 1440 1500" role="img" aria-labelledby="title desc">
  <title id="title">Cari Ralphthon 2026 pitch deck</title>
  <desc id="desc">A visual overview of the Cari presentation deck, showing the key slides and story beats.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf1"/>
      <stop offset=".5" stop-color="#f3fbf5"/>
      <stop offset="1" stop-color="#eaf8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#17231d" flood-opacity=".13"/>
    </filter>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.8" fill="#0aa39a" opacity=".22"/>
      <circle cx="12" cy="9" r="1.5" fill="#0b3f52" opacity=".18"/>
      <circle cx="8" cy="15" r="1.3" fill="#ffd23f" opacity=".22"/>
    </pattern>
  </defs>
  <rect width="1440" height="1500" fill="url(#bg)"/>
  <rect width="1440" height="1500" fill="url(#dots)" opacity=".8"/>
  <g transform="translate(72 64)">
    <text font-family="Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="4" fill="#0aa39a">RALPHTHON 2026</text>
    <text y="58" font-family="Arial, sans-serif" font-size="58" font-weight="900" fill="#0b3f52">Cari Pitch Deck</text>
    <text y="102" font-family="Arial, sans-serif" font-size="24" fill="#425f62">Presented by Tan Si Qi</text>
  </g>
  <g transform="translate(72 210)" filter="url(#shadow)">
    <rect width="1296" height="180" rx="22" fill="#0b3f52"/>
    <text x="52" y="78" font-family="Arial, sans-serif" font-size="50" font-weight="900" fill="#ffffff">Singapore has free money.</text>
    <text x="52" y="128" font-family="Arial, sans-serif" font-size="25" fill="#bff7f2">But caregivers cannot easily find what they qualify for.</text>
    <text x="1088" y="118" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#00d8d8">$</text>
  </g>
  <g transform="translate(72 430)" filter="url(#shadow)">
    <rect width="408" height="250" rx="18" fill="#ffffff"/>
    <rect x="0" y="0" width="408" height="52" rx="18" fill="#00d8d8"/>
    <text x="24" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#0b3f52">01 PROBLEM</text>
    <text x="24" y="112" font-family="Arial, sans-serif" font-size="37" font-weight="900" fill="#0b3f52">Most caregivers</text>
    <text x="24" y="158" font-family="Arial, sans-serif" font-size="37" font-weight="900" fill="#0b3f52">never use them.</text>
    <text x="24" y="210" font-family="Arial, sans-serif" font-size="20" fill="#5d6f6a">Support exists, but discovery does not.</text>
  </g>
  <g transform="translate(516 430)" filter="url(#shadow)">
    <rect width="408" height="250" rx="18" fill="#ffffff"/>
    <rect x="0" y="0" width="408" height="52" rx="18" fill="#00d8d8"/>
    <text x="24" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#0b3f52">02 CURRENT FLOW</text>
    <text x="24" y="108" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#0b3f52">17 browser tabs</text>
    <text x="24" y="148" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#0b3f52">random PDFs</text>
    <text x="24" y="188" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#0b3f52">login errors</text>
    <text x="302" y="210" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#00a39a">404</text>
  </g>
  <g transform="translate(960 430)" filter="url(#shadow)">
    <rect width="408" height="250" rx="18" fill="#ffffff"/>
    <rect x="0" y="0" width="408" height="52" rx="18" fill="#00d8d8"/>
    <text x="24" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#0b3f52">03 CAREGIVER REALITY</text>
    <text x="24" y="112" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#0b3f52">Google.</text>
    <text x="24" y="158" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#0b3f52">WhatsApp.</text>
    <text x="24" y="204" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#0b3f52">Reddit. MP.</text>
  </g>
  <g transform="translate(72 724)" filter="url(#shadow)">
    <rect width="630" height="250" rx="18" fill="#0b3f52"/>
    <text x="34" y="60" font-family="Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="3" fill="#00d8d8">HOW CARI WORKS</text>
    <text x="34" y="126" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff">One message.</text>
    <text x="34" y="184" font-family="Arial, sans-serif" font-size="56" font-weight="900" font-style="italic" fill="#00d8d8">That's it.</text>
    <path d="M495 104l64 35-64 35z" fill="#ffd23f"/>
  </g>
  <g transform="translate(738 724)" filter="url(#shadow)">
    <rect width="630" height="250" rx="18" fill="#ffffff"/>
    <text x="34" y="60" font-family="Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="3" fill="#00a39a">DEMO</text>
    <text x="34" y="116" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#0b3f52">Cari finds caregiver</text>
    <text x="34" y="160" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#0b3f52">support in one message.</text>
    <rect x="420" y="42" width="150" height="166" rx="18" fill="#fff9df" stroke="#dce8de"/>
    <circle cx="495" cy="104" r="34" fill="#0b3f52"/>
    <text x="495" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#fff9df">CARI</text>
    <rect x="448" y="155" width="94" height="16" rx="8" fill="#00d8d8"/>
  </g>
  <g transform="translate(72 1018)" filter="url(#shadow)">
    <rect width="408" height="250" rx="18" fill="#ffffff"/>
    <text x="24" y="58" font-family="Arial, sans-serif" font-size="20" font-weight="900" letter-spacing="3" fill="#0aa39a">OUTCOME</text>
    <text x="24" y="120" font-family="Arial, sans-serif" font-size="35" font-weight="900" fill="#0b3f52">Cari further</text>
    <text x="24" y="166" font-family="Arial, sans-serif" font-size="35" font-weight="900" fill="#0b3f52">simplifies for</text>
    <text x="24" y="212" font-family="Arial, sans-serif" font-size="35" font-weight="900" fill="#e93f7b">you.</text>
  </g>
  <g transform="translate(516 1018)" filter="url(#shadow)">
    <rect width="408" height="250" rx="18" fill="#ffffff"/>
    <text x="24" y="58" font-family="Arial, sans-serif" font-size="20" font-weight="900" letter-spacing="3" fill="#0aa39a">CARE PLAN</text>
    <text x="24" y="112" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#0b3f52">1. What you qualify for</text>
    <text x="24" y="154" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#0b3f52">2. How much you save</text>
    <text x="24" y="196" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#0b3f52">3. What to do next</text>
  </g>
  <g transform="translate(960 1018)" filter="url(#shadow)">
    <rect width="408" height="250" rx="18" fill="#ffffff"/>
    <text x="24" y="58" font-family="Arial, sans-serif" font-size="20" font-weight="900" letter-spacing="3" fill="#0aa39a">LET'S CONNECT</text>
    <text x="24" y="122" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#0b3f52">Tan Si Qi</text>
    <text x="24" y="164" font-family="Arial, sans-serif" font-size="25" fill="#5d6f6a">AKA &quot;Q&quot;</text>
    <rect x="268" y="58" width="88" height="88" fill="#0b3f52"/>
    <rect x="284" y="74" width="20" height="20" fill="#ffffff"/>
    <rect x="320" y="74" width="20" height="20" fill="#ffffff"/>
    <rect x="284" y="110" width="20" height="20" fill="#ffffff"/>
    <rect x="320" y="110" width="20" height="20" fill="#ffffff"/>
  </g>
  <text x="720" y="1408" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#425f62">
    Deck slides: 1, 2, 3, 4, 5, 6, 7, 8, 12, 13, 14
  </text>
</svg>
